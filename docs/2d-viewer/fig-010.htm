<!DOCTYPE html />
<html lang="en"><head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="all" />
<title>Figure 10: Axis Length Calculation</title>
</head><body>

<svg id="svgRoot" width="390" height="290" viewBox="-180 -140 390 290" style="border:1px solid silver" >
<defs>
	<style type="text/css">
		g#points circle { r : 4px }
		</style>
	<marker id="axis-arrow" orient="auto-start-reverse" markerUnits="userSpaceOnUse" markerHeight="8" markerWidth="20" refX="20" refY="4">
		<path fill="context-stroke" stroke="none" stroke-width="0" d="M 20 4 L 0 0 V 8" />
		</marker>
	</defs>
<g id="cartesianSystem" stroke="#ddd" stroke-width="1" fill="none">
	<rect x="-100" y="-100" width="200" height="200" stroke-width="1" />
	<line x1="-130" x2="200" marker-end="url(#axis-arrow)" /><!--x-axis-->
	<line y1="-130" y2="140" marker-end="url(#axis-arrow)" /><!--y-axis-->
	</g>
<g id="obliqueSystem" stroke="#666" stroke-width="1" >
	<line id="xAxis" x1="-160" x2="215" stroke="red" marker-end="url(#axis-arrow)" />
	<line id="yAxis" y1="-130" y2="150" stroke="green" marker-end="url(#axis-arrow)" />
	<g id="undistortedElements" stroke="none" >
		<g id="points" fill="#888"></g>
		<g id="annotations" font-size="18" stroke="white" fill="black" stroke-width="6" paint-order="stroke fill" text-anchor="middle" dominant-baseline="central" ></g>
		</g>
	</g>
<g id="points" stroke="none" fill="#888">
	<circle /><!-- origin -->
	</g>
<g id="annotations" font-size="18" stroke="white" stroke-width="6" paint-order="stroke fill" text-anchor="middle" dominant-baseline="central" >
	<text x="60" y="8">&eta;</text>
	<text x="-13" y="50">&theta;</text>
	<text x="-17" y="5">A</text>
	</g>
</svg>

<script>
const svgNamespace = "http://www.w3.org/2000/svg" ;
const degree = Math.PI / 180 ;
const eta = 20 * degree ;
const theta = 30 * degree ;
obliqueSystem.setAttribute( "transform", `matrix( ${ Math.cos( eta ) }, ${ Math.sin( eta ) }, ${ -Math.sin( theta ) }, ${ Math.cos( theta )  }, 0, 0 )` );
const matrix = obliqueSystem.transform.baseVal[ 0 ].matrix;
function inverse( points = [ ] ) { 
	const result = [ ] ;
	const im = obliqueSystem.transform.baseVal[ 0 ].matrix.inverse( );
	for ( let i = 0 ; i < points.length ; i += 2 ) {
		const point = new DOMPoint( points[ i ], points[ i + 1 ] || 0 ).matrixTransform( im );
		result.push( point.x, point.y ) ;
		}
	return result ;
	}
function initUndistortedElements ( ) {
	const transform = svgRoot.createSVGTransform( );
	transform.setMatrix( obliqueSystem.transform.baseVal[ 0 ].matrix.inverse( ) ) ;
	for ( const e of undistortedElements.querySelectorAll("*") ) {
		if ( e.tagName === "g" ) continue ;
		e.transform.baseVal.appendItem( transform );
		}
	}
function extendLine( points, begin, end = begin ) {
	// Returns coordinates for extended lines.
	// Start and end points can be swapped without effect.
	if ( points instanceof SVGLineElement ) {
		points = [ points.x1.baseVal.value, points.y1.baseVal.value, points.x2.baseVal.value, points.y2.baseVal.value ];
		}
	const dx = points[ 2 ] - points[ 0 ];
	const dy = points[ 3 ] - points[ 1 ];
	const k1 = begin / Math.sqrt( dx ** 2 + dy ** 2 );
	const k2 = end / Math.sqrt( dx ** 2 + dy ** 2 );
	return [ points[ 0 ] - k1 * dx, points[ 1 ] - k1 * dy, points[ 2 ] + k2 * dx, points[ 3 ] + k2 * dy ];
	}
function quadrant1( phi ) {
	// Problematic: sin and cos rounding errors
	phi = phi / 180 * Math.PI;
	const x = Math.sin( phi ).toFixed(3) < 0 ? 0 : 1 ;
	const y = Math.cos( phi ).toFixed(3) < 0 ? 0 : 1 ;
	console.log( Math.sin(phi),Math.cos(phi));
	return { x, y };
	}
function quadrant( phi ) {
	let q = Math.floor( phi / 90 ) % 4 ;
	return q < 0 ? q += 4 : q ;
	}
function axisDeltaAngle ( eta, theta ) {
	let d = (90 - eta + theta) % 360;
	if ( d <= -180 ) d += 180 ;
	else if ( d > 180 ) d -= 180 ; 
	console.log( eta, theta, d );
	}
		
	/* * * * * */

// create elements in the oblique coordinate system
const pointB2 = inverse( [ 100, 100 ] );
let line = document.createElementNS( svgRoot.namespaceURI, "line" );
line.setAttribute( "x1", pointB2[ 0 ] );
line.setAttribute( "y1", pointB2[ 1 ] );
line.setAttribute( "x2", pointB2[ 0 ] );
line.setAttribute( "y2", 0 );
line.setAttribute( "stroke" , "green" );
obliqueSystem.append( line );
// const points = extendLine( line, 30 );
let extension = extendLine( [ line.x2.baseVal.value, line.y2.baseVal.value, line.x1.baseVal.value, line.y1.baseVal.value ], 30 );
line.setAttribute( "x1", extension[ 0 ] );
line.setAttribute( "y1", extension[ 1 ] );
line.setAttribute( "x2", extension[ 2 ] );
line.setAttribute( "y2", extension[ 3 ] );
// Second corner
const pointB1 = inverse( [ -100, -100 ] );
line = document.createElementNS( svgRoot.namespaceURI, "line" );
line.setAttribute( "x1", pointB1[ 0 ] );
line.setAttribute( "y1", pointB1[ 1 ] );
line.setAttribute( "x2", pointB1[ 0 ] );
line.setAttribute( "y2", 0 );
line.setAttribute( "stroke" , "green" );
obliqueSystem.append( line );
extension = extendLine( line, 30 );
line.setAttribute( "x1", extension[ 0 ] );
line.setAttribute( "y1", extension[ 1 ] );
line.setAttribute( "x2", extension[ 2 ] );
line.setAttribute( "y2", extension[ 3 ] );
// Create elements in the undistorted elements group in the oblique coordinate system
const undistortedPoints = obliqueSystem.querySelector( "#undistortedElements > #points" );
const undistortedText = obliqueSystem.querySelector( "#undistortedElements > #annotations" );
// B2
let circle = document.createElementNS( svgRoot.namespaceURI, "circle" );
circle.setAttribute( "transform", `translate(${ pointB2[ 0 ] },${ pointB2[ 1 ] })` ) ;
undistortedPoints.append( circle );
// D1
circle = document.createElementNS( svgRoot.namespaceURI, "circle" );
circle.setAttribute( "transform", `translate(${ pointB2[ 0 ] }, 0)` );
undistortedPoints.append( circle );
// B1
circle = document.createElementNS( svgRoot.namespaceURI, "circle" );
circle.setAttribute( "transform", `translate(${ pointB1[ 0 ] },${ pointB1[ 1 ] })` ) ;
undistortedPoints.append( circle );
// D2
circle = document.createElementNS( svgRoot.namespaceURI, "circle" );
circle.setAttribute( "transform", `translate(${ pointB1[ 0 ] }, 0)` );
undistortedPoints.append( circle );
// Annotations
let text = document.createElementNS( svgRoot.namespaceURI, "text" );
text.setAttribute( "transform", `translate(${ pointB2[ 0 ] + 20 }, -20 )` );
text.textContent = "D2" ;
undistortedText.append( text );
text = document.createElementNS( svgRoot.namespaceURI, "text" );
text.setAttribute( "transform", `translate(${ pointB2[ 0 ] + 20 }, ${ pointB2[ 1 ] + 20 })` );
text.textContent = "B2" ;
undistortedText.append( text );
text = document.createElementNS( svgRoot.namespaceURI, "text" );
text.setAttribute( "transform", `translate(${ pointB1[ 0 ] - 20 }, +15 )` );
text.textContent = "D1" ;
undistortedText.append( text );
text = document.createElementNS( svgRoot.namespaceURI, "text" );
text.setAttribute( "transform", `translate(${ pointB1[ 0 ] - 25 }, ${ pointB1[ 1 ] - 5 })` );
text.textContent = "B1" ;
undistortedText.append( text );
// Add inverse transformation matrix to undistorted elements
initUndistortedElements( );
// Tests
axisDeltaAngle( 0, 0 );
axisDeltaAngle( 0, 89 );
axisDeltaAngle( 0, 90 );
axisDeltaAngle( 0, 91 );
</script>

</body></html>
