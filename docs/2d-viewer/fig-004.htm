<html><head>

</head><body>

<svg id="svgRoot" width="500" height="500" viewBox="-250 -250 500 500" style="border:1px solid silver" >
<g id="cartesian-system">
	<circle r="250" fill="none" stroke="#666"/>
	<circle r="50" fill="none" stroke="#666"/>
	<g name="gridlines" stroke="#ddd" stroke-width="1" >
		<line x1="-250" x2="250" y1="-200" y2="-200" />
		<line x1="-250" x2="250" y1="-150" y2="-150" />
		<line x1="-250" x2="250" y1="-100" y2="-100" />
		<line x1="-250" x2="250" y1="-50" y2="-50" />
		<line x1="-250" x2="250" y1="50" y2="50" />
		<line x1="-250" x2="250" y1="100" y2="100" />
		<line x1="-250" x2="250" y1="150" y2="150" />
		<line x1="-250" x2="250" y1="200" y2="200" />
		<line y1="-250" y2="250" x1="-200" x2="-200" />
		<line y1="-250" y2="250" x1="-150" x2="-150" />
		<line y1="-250" y2="250" x1="-100" x2="-100" />
		<line y1="-250" y2="250" x1="-50" x2="-50" />
		<line y1="-250" y2="250" x1="50" x2="50" />
		<line y1="-250" y2="250" x1="100" x2="100" />
		<line y1="-250" y2="250" x1="150" x2="150" />
		<line y1="-250" y2="250" x1="200" x2="200" />
	</g>
	<g name="axes" stroke="#444" stroke-width="1">
		<line id="xaxis" x1="-250" x2="250" />
		<line id="yaxis" y1="-250" y2="250" />
		</g>
	</g>
<g id="obliqueSystem">
	<g name="gridlines" stroke="#fbb" stroke-width="1" >
		<line id="xaxis" x1="-250" x2="250" y1="-250" y2="-250" />
		<line id="xaxis" x1="-250" x2="250" y1="-200" y2="-200" />
		<line id="xaxis" x1="-250" x2="250" y1="-150" y2="-150" />
		<line id="xaxis" x1="-250" x2="250" y1="-100" y2="-100" />
		<line id="xaxis" x1="-250" x2="250" y1="-50" y2="-50" />
		<line id="xaxis" x1="-250" x2="250" y1="50" y2="50" />
		<line id="xaxis" x1="-250" x2="250" y1="100" y2="100" />
		<line id="xaxis" x1="-250" x2="250" y1="150" y2="150" />
		<line id="xaxis" x1="-250" x2="250" y1="200" y2="200" />
		<line id="xaxis" x1="-250" x2="250" y1="250" y2="250" />
		<line id="xaxis" y1="-250" y2="250" x1="-250" x2="-250" />
		<line id="xaxis" y1="-250" y2="250" x1="-200" x2="-200" />
		<line id="xaxis" y1="-250" y2="250" x1="-150" x2="-150" />
		<line id="xaxis" y1="-250" y2="250" x1="-100" x2="-100" />
		<line id="xaxis" y1="-250" y2="250" x1="-50" x2="-50" />
		<line id="xaxis" y1="-250" y2="250" x1="50" x2="50" />
		<line id="xaxis" y1="-250" y2="250" x1="100" x2="100" />
		<line id="xaxis" y1="-250" y2="250" x1="150" x2="150" />
		<line id="xaxis" y1="-250" y2="250" x1="200" x2="200" />
		<line id="xaxis" y1="-250" y2="250" x1="250" x2="250" />
		</g>
	<g id="axes" stroke="#f44" stroke-width="1" fill="none">
		<line id="xaxis" x1="-250" x2="250" />
		<line id="yaxis" y1="-250" y2="250" />
		<circle cx="250" cy="0" r="3" />
		<circle cy="250" cy="0" r="3" />
		</g>
	</g>
</svg>

<script type="module">
const radians = Math.PI / 180 ;
const theta = -10 * radians ;
const phi = 20 * radians ;
const a = Math.cos( theta );
const b = Math.sin( theta );
const c = -Math.sin( phi );
const d = Math.cos( phi );
obliqueSystem.setAttribute( "transform" , `matrix( ${ a }, ${ b }, ${ c }, ${ d }, 0, 0 )` );
</script>

</body></html>
