<script>

class ElementBase {
	removeDefaultAttributes( value, ...args ) {
		args.forEach( key => { if ( this.svgElement.getAttribute( key ) === value ) this.svgElement.removeAttribute( key ) } ) ;
		}
	setAttributes ( attributes ) {
		for ( const [ key, value ] of Object.entries( attributes ) ) {
			if ( typeof value === "boolean" ) this.svgElement.toggleAttribute( key, value );
			else this.svgElement.setAttribute( key, value );
			}
		}
	}
class Circle extends ElementBase {
	static defaultAttributes = { stroke : "black", fill : "none", r : 20 };
	constructor ( point={x:0,y:0}, attributes={}, options={} ) {
		super( );
		attributes = { ...Circle.defaultAttributes, ...attributes };
		attributes.cx = point.x || 0 ;
		attributes.cy = point.y || 0 ;
		this.svgElement = options.svgCircleElement || document.createElementNS( svgRoot.namespaceURI, "circle" );
		this.setAttributes( attributes );
		this.removeDefaultAttributes( "0", "cx", "cy", "r" );
		}
	}
class Dot extends Circle {
	static defaultAttributes = { stroke : "none" , fill : "#888" , r : 4 };
	constructor ( point, attributes={}, options={} ) {
		super( point, attributes, { ...Dot.defaultAttributes, ...attributes }, options );
		}
	}
class Line extends ElementBase {
	static defaultAttributes = { } ;
	constructor ( ...args ) {
		super( );
		var x1=0, y1=0, x2=0, y2=0 ;
		// Four points
		if ( args[ 0 ] instanceof SVGLineElement ) {
			x1 = args[ 0 ].x1.baseVal.value ;
			y1 = args[ 0 ].y1.baseVal.value ; 
			x2 = args[ 0 ].x2.baseVal.value ;
			y1 = args.shift( ).y2.baseVal.value ;
			}
		else if ( args[ 0 ] instanceof SVGRectElement ) {
			x1 = args[ 0 ].x.baseVal.value ;
			y1 = args[ 0 ].y.baseVal.value ; 
			x2 = x1 + args[ 0 ].width.baseVal.value ;
			y1 = y1 + args.shift( ).height.baseVal.value ;
			}

			var { x1, y1, x2, y2 } = args.shift( );
			}
		else if ( [ "x", "y", "width", "height" ].every( key => Object.hasOwn( args[ 0 ], key ))) {
			var { x1, y1, width:x2, height:y2 } = args.shift( );
			x2 += x1 ;
			y2 += y1 ;
			}
		else if ( args[ 0 ] instanceof Array ) {
			[ x1, y1, x2, y2 ] = args.shift( );
			}
		else {
			// First pair of values
			if ( args[ 0 ] instanceof SVGCircleElement ) {
				x1 = args[ 0 ].cx.baseVale.value ;
				y1 = args[ 0 ].cy.baseVale.value ;
				}
			if ( [ "x", "y" ].every( key => Object.hasOwn( args[ 0 ], key ))) {
				var { x:x1, y:y1 } = args.shift( );
				}
			if ( typeof args[ 0 ] === "number" ) {
				x1 = args.shift( );
				y1 = args.shift( );
				}
			// Second pair of values
			if ( args[ 0 ] instanceof SVGCircleElement ) {
				x2 = args[ 0 ].cx.baseVale.value ;
				y2 = args[ 0 ].cy.baseVale.value ;
				}
			if ( [ "x", "y" ].every( key => Object.hasOwn( args[ 0 ], key ))) {
				var { x:x2, y:y2 } = args.shift( );
				}
			if ( typeof args[ 0 ] === "number" ) {
				x2 = args.shift( );
				y2 = args.shift( );
				}
			}
		const attributes = { ...Line.defaultAttributes, ...( args.shift( ) || { } ) };
		attributes.x1 = x1 ;
		attributes.y1 = y1 ;
		attributes.x2 = x2 ;
		attributes.y2 = y2 ;
		const options = args.shift( ) || { } ;
		this.svgElement = options.existingSvgElement || document.createElementNS( svgRoot.namespaceURI, "line" );
		this.setAttributes( attributes );
		this.removeDefaultAttributes( "0", "x1", "y1", "x2", "y2" );
		}
	}
class CoordinateSystem {
	constructor ( eta=0, theta=0, extent=svgRoot.viewBox.baseVal, coordinateSystemElement=coordinateSystem ) {
		this.eta = eta ;

			( this.yGrigLines = this.cs.appendChild( document.createElementNS( svgRoot.namespaceURI, "SVGGElement" ))).id = "yGridLines" ;

			this.annotations.setAttribute( "paint-order", "stroke fill" );

		this.points = this.cs.querySelector( "#points" );
		this.extent = DOMRect.fromRect( extent );
		this.cs.setAttribute( "transform" , "matrix(1,0,0,1,0,0)" );
		this.matrix = this.cs.transform.baseVal[ 0 ].matrix ;
		this.inverseMatrix = this.matrix.inverse( );
		this.setAngles( eta, theta );
		this.createGrid( );
		}
	addUndistorted( element, point, container ) {
		// Add an inverse matrix transform with translation to the point.
		element = element.svgElement || element ;
		const im = coordinateSystem.transform.baseVal[ 0 ].matrix.inverse( );
		element.setAttribute( "transform" , `matrix( ${im.a},${im.b},${im.c},${im.d},${point.x},${point.y} )` );
		if ( typeof container === "string" ) container = this.undistorted.querySelector( container );
		return container.appendChild( element );
		}
	createGrid( ) {
		const im = this.matrix.inverse( );

		this.addUndistorted( new Circle( ), B4 = new DOMPoint( this.extent.right , this.extent.top ).matrixTransform( im ), "#points" );

			[ [ B3,B1 ],[ B3,B1 ],[ B1,B3 ],[ B1,B3 ] ] ,
			[ [ B4,B2 ],[ B4,B2 ],[ B2,B4 ],[ B2,B4 ] ] ,
			[ [ B3,B1 ],[ B3,B1 ],[ B1,B3 ],[ B1,B3 ] ] ,
			];
		console.log( this.quadrant( this.eta ), this.quadrant( this.theta + 90 ));
		let [ ymin,ymax ] = limits[ this.quadrant( this.eta ), this.quadrant( this.theta + 90 ) ];
		ymin = ymin.y;
		ymax = ymax.y;

		let [ xmin,xmax ] = limits[ this.quadrant( this.theta + 90 ), this.quadrant( this.eta ) ];
		xmin = xmin.x;
		xmax = xmax.x;

		this.addUndistorted( new Circle( ), {x:0, y:ymin}, "#points" );
		this.addUndistorted( new Circle( ), {x:0, y:ymax}, "#points" );		
		this.yGridLines.append( new Line( 0, ymin, 0, ymax, { id: "yAxis", stroke: "green" } ).svgElement );
		// Add x-gridlines
		this.xGridLines.append( new Line( xmin, ymin, xmax, ymin ).svgElement );
		this.xGridLines.append( new Line( xmin, ymax, xmax, ymax ).svgElement );
		this.yGridLines.append( new Line( xmin, ymin, xmin, ymax ).svgElement );
		this.yGridLines.append( new Line( xmax, ymin, xmax, ymax ).svgElement );
		Circle.defaultAttributes = attributes ;
		}
	quadrant ( angle ) {
		// Converts an angle (in degree) to a quadrant number 0...3
		const q = (angle / 90) % 4 ;
		return Math.floor( q < 0 ? q + 4 : q );
		}
	setAngles( eta, theta ) {
		this.eta = eta ; 
		this.theta = theta ;
		eta *= Math.PI / 180 ;
		theta *= Math.PI / 180 ;
		this.matrix.a = Math.cos( eta );
		this.matrix.b = Math.sin( eta );
		this.matrix.c = -Math.sin( theta );
		this.matrix.d = Math.cos( theta );
		}
	}
