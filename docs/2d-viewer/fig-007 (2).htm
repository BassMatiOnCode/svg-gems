<html><head>
<html lang="en"><head>
<meta charset="utf-8">
<title>Figure 6 ŷ basis vector expression</title>

</head><body>

<svg id="svgRoot" width="250" height="350" viewBox="-50 -50 250 350" style="border:1px solid silver" >
<defs>
	<style type="text/css">
		g.points circle { r : 4px }
		</style>
	</defs>
<g id="cartesianSystem" stroke="#ddd" stroke-width="2" >
	<line x1="-50" x2="400" />
	<line y1="-50" y2="300" />
	</g>
<g id="obliqueSystem" stroke="#fbb" stroke-width="2" >
	<line x1="-55" x2="375" transform="rotate(20)" />
	<line y1="-60" y2="100" transform="rotate(30)" />
	<line y1="-350" y2="100	" transform="translate(0,250) rotate(30) " />
	</g>
<g class="points" stroke="none" fill="#888">
	<circle  />
	<circle cy="250" />
	<circle cx="120" cy="43" />
	</g>
<g id="annotations" font-size="18" stroke="white" stroke-width="6" paint-order="stroke fill">
	<g fill="#888" transform="translate(0,-1)">
		<text x="25" y="250" text-anchor="start" dominant-baseline="central" >(1,0)</text>
		<text x="148" y="38" text-anchor="start" dominant-baseline="central">(?,?)</text>
		</g>
	<g fill="#f44">
		</g>
	<g fill="black">
		<text x="10" y="-15" text-anchor="middle" dominant-baseline="central">O<tspan fill="#888">  (0,0)</tspan></text>
		<text x="10" y="250" text-anchor="start" dominant-baseline="central">C</text>
		<text x="132" y="38" text-anchor="start" dominant-baseline="central">Y</text>
		<text x="80" y="28" text-anchor="middle" dominant-baseline="central">c</text>
		<text x="60" y="144" text-anchor="middle" dominant-baseline="central">d</text>
		<text x="0" y="125" text-anchor="middle" dominant-baseline="central">y</text>
		<text x="-12" y="50" text-anchor="middle" dominant-baseline="central">&theta;</text>
		<text x="65" y="8" text-anchor="middle" dominant-baseline="central">&eta;</text>
		<text x="13" y="200" text-anchor="middle" dominant-baseline="central">&theta;</text>
		<text x="19" y="25" text-anchor="middle" dominant-baseline="central">&delta;</text>
		<text x="100" y="50" text-anchor="end" dominant-baseline="central">&upsilon;</text>
		</g>
	</g>
</svg>

<script type="module">
const radians = Math.PI / 180 ;
const theta = +25 * radians ;		// x-axis tilt angle
const phi = -25 * radians ;			// y-axis tilt angle
const a = Math.cos( theta );
const b = Math.sin( theta );
const c = -Math.sin( phi );
const d = Math.cos( phi );
// obliqueSystem.setAttribute( "transform" , `matrix( ${ a }, ${ b }, ${ c }, ${ d }, 0, 0 )` );
function transform( r, s ) { return { 
	x : r * a + c * s ,
	y : r * b + d * s
	} } ;
</script>

</body></html>
