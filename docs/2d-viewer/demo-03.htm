<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="all" />
<title>Undistorted Tick Labels</title>

</head><body>

<svg id="svgRoot" width="500" height="500" viewBox="-250 -250 500 500" style="border:1px solid silver">
<g id="obliqueCoordinateSystem">
	<g id="gridLinesX" stroke="#ddd"></g>
	<g id="gridLinesY" stroke="#ddd"></g>
	<g id="xaxis" stroke-width="2"></g>
	<g id="yaxis" stroke-width="2"></g>
	<g paint-order="stroke fill" stroke="white" stroke-width="8">
		<g id="tickmarksX" text-anchor="middle"></g>
		<g id="tickmarksY" text-anchor="start" dominant-baseline="central"></g>
		</g>
	</g>
</svg>

<script>
const svgNamespace = "http://www.w3.org/2000/svg" ;
const degree = Math.PI / 180 ;
const radian = 180 / Math.PI ;
getAngleUnits = ( ) => { return { degree : degree, radian : radian } } ;
const grid = {
	// x-grid properties 
	xangle : 0 * degree ,			// tilt angle
	xmin : -500 ,							// leftmost grid line
	xmax : +500 ,							// rightmost grid line
	xstep : 50 ,								// distance between grid lines
	// y-grid properties
	yangle : 0 * degree ,
	ymin : -500 ,
	ymax : +500 ,
	ystep : 50 
	} ;
function getGridConfiguration( ) { return grid }
let view = { 
	offsetX : 0 , 
	offsetY : 0 , 
	zoom : 1 ,
	isPanning : false ,
	startPoint : { x : 0 , y : 0 }
	} ;
function transform( points = [ ] ) {
	const out = [ ] ;
	// Transforms oblique coordinates r, s into SVG coordinates
	while ( points.length > 1 ) {
		const r = points.shift( );
		const s = points.shift( );
		out.push( r * Math.cos( grid.xangle ) - s * Math.sin( grid.yangle ));
		out.push( r * Math.sin( grid.xangle ) + s * Math.cos( grid.yangle ));
		}
	return out ;
	}
function createLine( points = [ ], attributes = { } ) {
	const line = document.createElementNS( svgNamespace, "line" );
	attributes.x1 = points[ 0 ]; attributes.y1 = points[ 1 ];
	attributes.x2 = points[ 2 ]; attributes.y2 = points[ 3 ];
	for ( const [key, value] of Object.entries( attributes )) line.setAttribute( key, value );
	return line ;
	}
function createText( points = [ ], text = "", attributes = { } ) {
	const o = document.createElementNS( svgNamespace, "text" );
	o.textContent = text ;
	attributes.x = points[ 0 ] ;
	attributes.y = points[ 1 ] ;
	for ( const [key, value] of Object.entries( attributes )) o.setAttribute( key, value );
	return o ;
	}
function setGridMatrix( ) {
	// Setup/update  tranformation matrix
	const a = Math.cos( grid.xangle );
	const b = Math.sin( grid.xangle );
	const c = -Math.sin( grid.yangle );
	const d = Math.cos( grid.yangle );
	const e = 0 ;
	const f = 0 ;
	obliqueCoordinateSystem.setAttribute( "transform" , `matrix( ${ a }, ${ b }, ${ c }, ${ d }, ${ e }, ${ f } )` );
	}
function drawGrid ( ) {
	setGridMatrix( );
	// Vertical lines for the x grid
	for ( let i = grid.xmin ; i <= grid.xmax ; i += grid.xstep ) {
		const points = [ i, grid.ymin, i, grid.ymax ] ;
		let attributes = i === 0 ? { id: "xAxis", "stroke-width":  2, stroke: "#8b8" } : { } ;
		const line = createLine( points, attributes );
		gridLinesX.appendChild( line );
		// tickmarks x
		points[ 1 ] = -10 ;
		const text = createText( points, ( i / grid.xstep ).toFixed( 0 ) );
		tickmarksX.appendChild( text );
		}
	// Horizontal lines for the y grid
	for ( let i = grid.ymin ; i <= grid.ymax ; i += grid.ystep ) {
		const points = [ grid.xmin, i, grid.xmax, i ] ;
		let attributes = i === 0 ? { id: "yAxis", "stroke-width":  2, stroke: "#daa" } : undefined ;
		const line = createLine( points, attributes );
		gridLinesY.appendChild( line );
		// tickmarks y
		points[ 0 ] = 10 ;
		const text = createText( points, ( i / grid.ystep ).toFixed( 0 ) );
		tickmarksY.appendChild( text );
		}
	}
function updateView() {
	// Update the ViewBox based on pan and zoom
	const width = svgRoot.width.baseVal.value * view.zoom;
	const height = svgRoot.height.baseVal.value * view.zoom;
	const minX = view.offsetX - width / 2;
	const minY = view.offsetY - height / 2;
	svgRoot.setAttribute( "viewBox", `${minX} ${minY} ${width} ${height}` );
	}
svgRoot.addEventListener("mousedown", e => {
	// Start panning
	view.isPanning = true ;
	view.pannigStart = { x : e.clientX , y : e.clientY } ;
	} ) ;
window.addEventListener( "mousemove" , e => {
	// Handle panning
	if ( ! view.isPanning ) return;
	const dx = (view.pannigStart.x - e.clientX) * view.zoom ;
	const dy = (view.pannigStart.y - e.clientY) * view.zoom ;
	view.offsetX += dx ;
	view.offsetY += dy ;
	view.pannigStart = { x : e.clientX, y : e.clientY } ;
	updateView( );
	} ) ;
window.addEventListener( "mouseup", ( ) => view.isPanning = false );  // End panning
svgRoot.addEventListener( "wheel", e => {
	// Zoom
	e.preventDefault( );
	const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9 ;
	view.zoom *= zoomFactor ;
	updateView( );
	} , { passive : false } ) ;
// Initial display update
drawGrid( );
updateView( );
</script>
</body></html>
