<!DOCTYPE html />
<html lang="en"><head>
<meta charset="utf-8">
<title>Figure 5 x̂ basis vector expression</title>
</head><body>

<svg id="svgRoot" width="400" height="200" viewBox="-75 -50 400 200" style="border:1px solid silver" >
<defs>
	<style type="text/css">
		g.points circle { r : 4px }
		</style>
	</defs>
<g id="cartesianSystem" stroke="#ddd" stroke-width="2" fill="none">
	<circle r="250" stroke="#000" stroke-width="1" stroke-dasharray="8 8"/>
	<line x1="-75" x2="400" />
	<line y1="-75" y2="300" />
	<line x1="250" x2="250" y1="-50" y2="300" />
	</g>
<g id="obliqueSystem" stroke="#fbb" stroke-width="2" >
	<line x1="-80" x2="375" transform="rotate(20)" />
	<line y1="-80" y2="100" transform="rotate(50)" />
	<line y1="-100" y2="395	" transform="translate(250,0) rotate(50) " />
	</g>
<g class="points" stroke="none" fill="#888">
	<circle  />
	<circle cx="250" />
	<circle cx="174" cy="64" />
	</g>
<g id="annotations" font-size="18" stroke="white" stroke-width="6" paint-order="stroke fill">
	<g fill="#888" transform="translate(0,-1)">
		<text x="10" y="-15" text-anchor="start" dominant-baseline="text-bottom">(0,0)</text>
		<text x="260" y="-15" text-anchor="start" dominant-baseline="text-bottom" >(1,0)</text>
		</g>
	<g fill="#f44">
		</g>
	<g fill="black">
		<text x="0" y="-15" text-anchor="middle" dominant-baseline="text-bottom">O</text>
		<text x="250" y="-15" text-anchor="middle" dominant-baseline="text-bottom">X</text>
		<text x="170" y="85" text-anchor="start" dominant-baseline="central">P</text>
		<text x="100" y="34" text-anchor="middle" dominant-baseline="central">a</text>
		<text x="205" y="37" text-anchor="middle" dominant-baseline="central">b</text>
		<text x="125" y="-2" text-anchor="middle" dominant-baseline="central">x</text>
		<text x="65" y="8" text-anchor="middle" dominant-baseline="central">&eta;</text>
		<text x="-14" y="30" text-anchor="middle" dominant-baseline="central">&theta;</text>
		<text x="215" y="10" text-anchor="middle" dominant-baseline="central">&alpha;</text>
		<text x="235" y="30" text-anchor="middle" dominant-baseline="central">&theta;</text>
		<text x="175" y="40" text-anchor="end" dominant-baseline="central">&gamma;</text>
		</g>
	</g>
</svg>

<script type="module">
const radians = Math.PI / 180 ;
const theta = +25 * radians ;		// x-axis tilt angle
const phi = -25 * radians ;			// y-axis tilt angle
const a = Math.cos( theta );
const b = Math.sin( theta );
const c = -Math.sin( phi );
const d = Math.cos( phi );
// obliqueSystem.setAttribute( "transform" , `matrix( ${ a }, ${ b }, ${ c }, ${ d }, 0, 0 )` );
function transform( r, s ) { return { 
	x : r * a + c * s ,
	y : r * b + d * s
	} } ;
</script>

</body></html>
