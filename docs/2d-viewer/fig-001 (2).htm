<html><head>
<style>
g#points circle { r : 4px }
</style>

</head><body>

<svg id="svgRoot" width="300" height="300" viewBox="-50 -50 300 300" style="border:1px solid silver" >
<g id="cartesianSystem" stroke="#ddd" stroke-width="2" >
	<circle r="150" fill="none" stroke="#888" />
	<g name="gridlines" >
		<line x1="-150" x2="300" />
		<line x1="-150" x2="300" y1="150" y2="150" />
		<line y1="-75" y2="300" />
		<line y1="-75" y2="300" x1="150" x2="150" />
	</g>
	<g name="axes">
		</g>
	</g>
<g id="obliqueSystem" stroke="#fbb" stroke-width="2" >
	<g name="gridlines" >
		<line x1="-150" x2="300" />
		<line x1="-200" x2="300" y1="150" y2="150" />
		<line y1="-100" y2="300" />
		<line y1="-175" y2="300" x1="150" x2="150" />
		</g>
	</g>
<g id="points" stroke="none">
	<g class="normal" fill="#888">
		<circle />
		<circle cx="150" />
		<circle cx="150" cy="150" />
		<circle cy="150" />
		</g>
	<g class="virtual update" fill="#f88">
		<circle cx="150" />
		<circle cx="150" cy="150" />
		<circle cy="150" />
		</g>
	</g>
<g id="annotations" font-size="14" text-anchor="middle" dominant-baseline="central" stroke="white" stroke-width="6" paint-order="stroke fill">
	<g class="normal">
		<text x="20" y="-15">(0,0)</text>
		<text x="170" y="-15">(1,0)</text>
		<text x="150" y="135">(1,1)</text>
		<text x="0" y="132">(0,1)</text>
		<g class="update">
			<text x="155" y="45">(1,0)</text>
			<text x="210" y="182">(1,1)</text>
			<text x="70" y="115">(0,1)</text>
			</g>
		</g>
	<g fill="#f88" class="transformed">
		<text x="-20" y="12">(0,0)</text>
		<text x="125" y="80">(1,0)</text>
		<text x="65" y="155">(0,1)</text>
		<text x="185" y="215">(1,1)</text>
		</g>
	</g>
</svg>

<script type="module">
const radians = Math.PI / 180 ;
const theta = +25 * radians ;		// x-axis tilt angle
const phi = -25 * radians ;			// y-axis tilt angle
const a = Math.cos( theta );
const b = Math.sin( theta );
const c = -Math.sin( phi );
const d = Math.cos( phi );
obliqueSystem.setAttribute( "transform" , `matrix( ${ a }, ${ b }, ${ c }, ${ d }, 0, 0 )` );
function transform( r, s ) { return { 
	x : r * a + c * s ,
	y : r * b + d * s
	} } ;
// Move objects from virtual to SVG (normal) space
for ( const o of document.querySelectorAll( "g.virtual *" )) {
	switch ( o.tagName ) {
	case "circle" : {
		const p = transform( o.getAttribute( "cx" ), o.getAttribute( "cy" ));
		o.setAttribute( "cx", p.x );
		o.setAttribute( "cy", p.y );
		break;
		}
	case "text" : {
		const p = transform( o.getAttribute( "x" ), o.getAttribute( "y" ));
		o.setAttribute( "x", p.x );
		o.setAttribute( "y", p.y );
		}
		}
	}
// Update the virtual coordinate annotations
const ps = points.querySelectorAll( "g.update *" ) ;
const as = annotations.querySelectorAll( "g.update *" ) ;
for ( let i = 0 ; i < ps.length ; i += 1 ) {
	const x = ( ps[ i ].cx.baseVal.value / 150 ).toFixed( 2 );
	const y = ( ps[ i ].cy.baseVal.value / 150 ).toFixed( 2 );
	as[ i ].textContent = `(${x},${y})` ;
	}
</script>

</body></html>
