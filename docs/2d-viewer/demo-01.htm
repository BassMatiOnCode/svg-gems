<html><head>

</head><body>
<svg id="svgRoot" width="500" height="500" viewBox="-250 -250 500 500" style="border:1px solid silver">
	<g id="coordinateSystem" stroke="#ccc" stroke-width="1"></g>
	</svg>
	</div>

<script>
let view = { x : 0, y : 0, zoom : 1 };
let isPanning = false;
let startPoint = { x: 0, y: 0 };
function createLine( p1, p2, attributes ) {
	const line = document.createElementNS( "http://www.w3.org/2000/svg", "line" );
	line.setAttribute( "x1", p1.x ); 
	line.setAttribute( "y1", p1.y );
	line.setAttribute( "x2", p2.x ); 
	line.setAttribute( "y2", p2.y );
	if ( attributes ) for ( const [key, value] of Object.entries( attributes )) line.setAttribute( key, value );
	return line ;
	}
function drawGrid() {
	coordinateSystem.innerHTML = "" ;
	const xmin = -500 ;
	const xmax = +500 ;
	const xstep = 50;
	const ymin = -500 ;
	const ymax = +500 ;
	const ystep = 50;
	// Vertical lines for the x grid
	for ( let i = xmin ; i <= xmax ; i += xstep ) {
		const p1 = { x: i, y: ymin };
		const p2 = { x: i, y: ymax };
		let attributes = i === 0 ? { id: "xAxis", "stroke-width":  2, stroke: "green" } : undefined ;
		const line = createLine( p1, p2, attributes );
		coordinateSystem.appendChild( line );
		}
	// Horizontal lines for the y grid
	for ( let i = ymin ; i <= ymax ; i += ystep ) {
		const p1 = { x: xmin, y: i };
		const p2 = { x: xmax, y: i };
		let attributes = i === 0 ? { id: "yAxis", "stroke-width":  2, stroke: "red" } : undefined ;
		const line = createLine( p1, p2, attributes );
		coordinateSystem.appendChild( line );
		}
	}
function updateView() {
	// Update the ViewBox based on pan and zoom
	const width = svgRoot.width.baseVal.value * view.zoom;
	const height = svgRoot.height.baseVal.value * view.zoom;
	const minX = view.x - width / 2;
	const minY = view.y - height / 2;
	svgRoot.setAttribute( "viewBox", `${minX} ${minY} ${width} ${height}` );
	}
svgRoot.addEventListener("mousedown", e => {
	// Start panning
	isPanning = true ;
	startPoint = { x : e.clientX , y : e.clientY } ;
	} ) ;
window.addEventListener( "mousemove" , e => {
	// Handle panning
	if ( ! isPanning ) return;
	const dx = (startPoint.x - e.clientX) * view.zoom ;
	const dy = (startPoint.y - e.clientY) * view.zoom ;
	view.x += dx ;
	view.y += dy ;
	startPoint = { x : e.clientX, y : e.clientY } ;
	updateView( );
	} ) ;
window.addEventListener( "mouseup", ( ) => isPanning = false );  // End panning
svgRoot.addEventListener( "wheel", e => {
	// Zoom
	e.preventDefault( );
	const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9 ;
	view.zoom *= zoomFactor ;
	updateView( );
	}, { passive : false } ) ;
// Initial display update
drawGrid( );
updateView( );
</script>
</body></html>
